<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Premium Glass Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Create Premium Portfolio</h1>
    <form id="portfolioForm">
      <input type="text" id="name" placeholder="Full Name" required />
      <input type="text" id="role" placeholder="Your Role (e.g., Software Engineer)" required />
      <textarea id="about" placeholder="About You" required></textarea>
      <input type="text" id="skills" placeholder="Skills (comma separated)" required />

      <div id="projectsContainer">
        <h3>Projects</h3>
        <input type="text" class="project-title" placeholder="Project Title" required />
        <textarea class="project-desc" placeholder="Project Description" required></textarea>
      </div>
      <button type="button" onclick="addProject()">+ Add Another Project</button>
      <br><br>
      <button type="submit">Generate Portfolio</button>
    </form>
  </div>

  <script>
    function addProject() {
      const container = document.getElementById("projectsContainer");
      const div = document.createElement("div");
      div.innerHTML = `
        <hr style="border-color: rgba(255,255,255,0.1); margin: 15px 0;" />
        <input type="text" class="project-title" placeholder="Project Title" required />
        <textarea class="project-desc" placeholder="Project Description" required></textarea>
      `;
      container.appendChild(div);
    }

    document.getElementById("portfolioForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const role = document.getElementById("role").value;
      const about = document.getElementById("about").value;
      const skills = document.getElementById("skills").value.split(',').map(s => s.trim());

      const titles = document.querySelectorAll(".project-title");
      const descs = document.querySelectorAll(".project-desc");
      const projects = Array.from(titles).map((title, i) => ({
        title: title.value,
        desc: descs[i].value
      }));

      const portfolioData = { name, role, about, skills, projects };
      localStorage.setItem("portfolio6Data", JSON.stringify(portfolioData));
      
      window.location.href = "temp6.html";
    });
  </script>
</body>
</html>
