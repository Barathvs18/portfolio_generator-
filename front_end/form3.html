<!-- form.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Portfolio Form</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="form-container">
    <h1>Fill Your Portfolio Details</h1>
    <form id="portfolioForm">
      <input type="text" id="name" placeholder="Your Name" required />
      <textarea id="about" placeholder="Write something about you" required></textarea>
      <input type="text" id="skills" placeholder="Skills (comma separated)" required />

      <h3>Projects</h3>
      <div id="projectsContainer">
        <input type="text" class="project-title" placeholder="Project Title" required />
        <textarea class="project-desc" placeholder="Project Description" required></textarea>
      </div>
      <button type="button" onclick="addProject()">+ Add Another Project</button>

      <br /><br />
      <button type="submit">Generate Portfolio</button>
    </form>
  </div>

  <script>
    // Add more project fields
    function addProject() {
      const container = document.getElementById("projectsContainer");
      const div = document.createElement("div");
      div.innerHTML = `
        <input type="text" class="project-title" placeholder="Project Title" required />
        <textarea class="project-desc" placeholder="Project Description" required></textarea>
      `;
      container.appendChild(div);
    }

    // Save user data to localStorage and redirect
    document.getElementById("portfolioForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const about = document.getElementById("about").value;
      const skills = document.getElementById("skills").value.split(',').map(skill => skill.trim());

      const titles = document.querySelectorAll(".project-title");
      const descs = document.querySelectorAll(".project-desc");
      const projects = Array.from(titles).map((title, i) => ({
        title: title.value,
        desc: descs[i].value
      }));

      const userData = { name, about, skills, projects };

      localStorage.setItem("portfolioData", JSON.stringify(userData));
      window.location.href = "index3.html";
    });
  </script>
</body>
</html>
